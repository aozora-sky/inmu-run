<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>$INMU run🐒</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        const SERVER_URL = 'https://aozora-sky.github.io/shiro-cat-run/';
        const RANKING_API_URL = 'https://script.google.com/macros/s/AKfycbzdBoOFoaNfwGsRw-MOhd0Z3fBt_RGsUPlXuOHxpllQ3kSNIV649jkUixWR90RrBLWv/exec';

        const GAME_WIDTH = 450;
        const GAME_HEIGHT = 800;
        const FALL_GAMEOVER_Y = GAME_HEIGHT + 60;

        const DISPLAY_SCALE = 0.67;

        const GROUND_WIDTH = 160;
        const GROUND_HEIGHT = 54;
        const DISPLAY_GROUND_WIDTH = GROUND_WIDTH * DISPLAY_SCALE;
        const GROUND_SPACING = Math.round(DISPLAY_GROUND_WIDTH * 0.96);

        const GROUND_Y_MIN = 430;
        const GROUND_Y_MAX = 640;
        const INITIAL_GROUND_Y = 610;

        const SECOND_JUMP_ANIM_LOCK_MS = 140;
        const LAND_RESET_LOCK_MS = 130;

        const config = {
            type: Phaser.AUTO,
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 1600 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        let player, grounds, enemies, items, coins;
        let score = 0, bonusScore = 0, gameSpeed = 5;
        let jumpCount = 0, maxJumps = 2;
        let isInvincible = false, scoreMultiplier = 1;
        let scoreText, scoreTimer, spawnTimer;
        let lastGroundY = INITIAL_GROUND_Y, lastEnemyX = 0, isGameOver = false;
        let bgm, seGameOver;
        let itemCounts = { banana: 0, budo: 0, cat035: 0, hogo: 0, shiro: 0 };
        let playCount = parseInt(localStorage.getItem('shiro_play_count') || '0', 10);
        let currentBgKey = 'daytime';
        let timerBanana = null, timerBudo = null, timer035 = null;

        let playerState = 'idle';
        let lastGroundedTime = 0;
        let wasOnGroundForLanding = false;
        let currentJumpAnimType = 'up';
        let secondJumpAnimUntil = 0;
        let lastJumpTime = 0;

        let rankingTexts = [];
        let rankingLoadingText = null;
        let isSubmittingRanking = false;
        let hasSubmittedRanking = false;
        let rankingRegisterButton = null;
        let rankingRequestId = 0;

        let gameMode = 'title';
        let titleUI = [];
        let gameOverUI = [];
        let resultScoreText = null;
        let resultItemText = null;

        function preload() {
            this.load.image('title', 'assets/title.png');
            this.load.image('result', 'assets/result.png');

            this.load.image('daytime', 'assets/daytime.png');
            this.load.image('sunset', 'assets/sunset.png');
            this.load.image('night', 'assets/night.png');
            this.load.image('moon', 'assets/moon.png');

            this.load.image('run1', 'assets/run1.png');
            this.load.image('run2', 'assets/run2.png');
            this.load.image('run3', 'assets/run3.png');
            this.load.image('run4', 'assets/run4.png');

            this.load.image('jump_up1', 'assets/jump_up1.png');
            this.load.image('jump_up2', 'assets/jump_up2.png');

            this.load.image('jump_2nd1', 'assets/jump_2nd1.png');
            this.load.image('jump_2nd2', 'assets/jump_2nd2.png');

            this.load.image('jump_down1', 'assets/jump_down1.png');
            this.load.image('jump_down2', 'assets/jump_down2.png');
            this.load.image('jump_down3', 'assets/jump_down3.png');

            this.load.image('ground', 'assets/ground.png');
            this.load.image('bee', 'assets/bee.png');
            this.load.image('banana', 'assets/banana.png');
            this.load.image('budo', 'assets/budo.png');
            this.load.image('035', 'assets/035.png');
            this.load.image('plant', 'assets/plant.png');
            this.load.image('inmu_coin', 'assets/inmu_coin.png');

            this.load.audio('music', 'assets/music.mp3');
            this.load.audio('gameover_se', 'assets/gameover.mp3');
        }

        function create() {
            this.physics.world.TILE_BIAS = 40;
            this.physics.world.setBounds(0, 0, GAME_WIDTH, GAME_HEIGHT + 1000);

            if (!bgm) {
                bgm = this.sound.add('music', { loop: true, volume: 0.5 });
            }
            seGameOver = this.sound.add('gameover_se', { volume: 0.7 });

            this.backGround = this.add.tileSprite(GAME_WIDTH / 2, GAME_HEIGHT / 2, GAME_WIDTH, GAME_HEIGHT, 'daytime');

            grounds = this.physics.add.group({
                allowGravity: false,
                immovable: true
            });

            enemies = this.physics.add.group({
                allowGravity: false
            });

            items = this.physics.add.group({
                allowGravity: false
            });

            coins = this.physics.add.group({
                allowGravity: false
            });

            createAnimations.call(this);

            player = this.physics.add.sprite(95, INITIAL_GROUND_Y - 90, 'run1');
            player.setScale(DISPLAY_SCALE);
            player.body.setSize(
                player.width * 0.58,
                player.height * 0.76
            );
            player.body.setOffset(
                player.width * 0.21,
                player.height * 0.20
            );
            player.setCollideWorldBounds(false);
            player.setBounce(0);
            player.setMaxVelocity(1000, 1400);

            scoreText = this.add.text(20, 20, '', {
                fontSize: '24px',
                fill: '#fff',
                stroke: '#000',
                strokeThickness: 4
            }).setDepth(1000);

            this.physics.add.collider(player, grounds);
            this.physics.add.overlap(player, enemies, hitEnemy, null, this);
            this.physics.add.overlap(player, items, collectItem, null, this);
            this.physics.add.overlap(player, coins, collectCoin, null, this);

            this.input.on('pointerdown', () => {
                if (gameMode === 'title') {
                    startGame.call(this);
                } else if (gameMode === 'playing') {
                    jump.call(this);
                }
            });

            showTitleScreen.call(this);
        }

        function createAnimations() {
            if (!this.anims.exists('run')) {
                this.anims.create({
                    key: 'run',
                    frames: [
                        { key: 'run1' },
                        { key: 'run2' },
                        { key: 'run3' },
                        { key: 'run4' }
                    ],
                    frameRate: 12,
                    repeat: -1
                });
            }

            if (!this.anims.exists('jump_up')) {
                this.anims.create({
                    key: 'jump_up',
                    frames: [
                        { key: 'jump_up1' },
                        { key: 'jump_up2' }
                    ],
                    frameRate: 10,
                    repeat: 0
                });
            }

            if (!this.anims.exists('jump_2nd')) {
                this.anims.create({
                    key: 'jump_2nd',
                    frames: [
                        { key: 'jump_2nd1' },
                        { key: 'jump_2nd2' }
                    ],
                    frameRate: 14,
                    repeat: 1
                });
            }

            if (!this.anims.exists('jump_down')) {
                this.anims.create({
                    key: 'jump_down',
                    frames: [
                        { key: 'jump_down1' },
                        { key: 'jump_down2' },
                        { key: 'jump_down3' }
                    ],
                    frameRate: 10,
                    repeat: -1
                });
            }
        }

        function startGame() {
            clearTitleUI();
            clearGameOverUI();
            clearRankingTexts();

            if (rankingLoadingText) {
                rankingLoadingText.destroy();
                rankingLoadingText = null;
            }

            rankingRequestId++;

            score = 0;
            bonusScore = 0;
            gameSpeed = 5;
            jumpCount = 0;
            maxJumps = 2;
            isInvincible = false;
            scoreMultiplier = 1;
            lastGroundY = INITIAL_GROUND_Y;
            lastEnemyX = 0;
            isGameOver = false;
            currentBgKey = 'daytime';
            playerState = 'idle';
            lastGroundedTime = 0;
            wasOnGroundForLanding = false;
            currentJumpAnimType = 'up';
            secondJumpAnimUntil = 0;
            lastJumpTime = 0;
            isSubmittingRanking = false;
            hasSubmittedRanking = false;
            rankingRegisterButton = null;

            itemCounts = { banana: 0, budo: 0, cat035: 0, hogo: 0, shiro: 0 };
            timerBanana = null;
            timerBudo = null;
            timer035 = null;

            grounds.clear(true, true);
            enemies.clear(true, true);
            items.clear(true, true);
            coins.clear(true, true);

            playCount++;
            localStorage.setItem('shiro_play_count', playCount);

            this.backGround.setTexture('daytime');
            player.setPosition(95, INITIAL_GROUND_Y - 90);
            player.setVelocity(0, 0);
            player.setAlpha(1);
            player.clearTint();
            player.setVisible(true);
            scoreText.setVisible(true);
            scoreText.setText(`Score: ${formatScore(0)}`);

            for (let i = 0; i < 6; i++) {
                createGround.call(this, i * GROUND_SPACING, INITIAL_GROUND_Y);
            }

            if (scoreTimer) scoreTimer.remove(false);
            if (spawnTimer) spawnTimer.remove(false);

            scoreTimer = this.time.addEvent({
                delay: 100,
                callback: () => {
                    score += (1 * scoreMultiplier);
                },
                callbackScope: this,
                loop: true
            });

            spawnTimer = this.time.addEvent({
                delay: 350,
                callback: spawnObstacle,
                callbackScope: this,
                loop: true
            });

            setPlayerState('run');
            this.physics.resume();
            gameMode = 'playing';
        }

        function showTitleScreen() {
            gameMode = 'title';
            isGameOver = false;

            if (scoreTimer) {
                scoreTimer.remove(false);
                scoreTimer = null;
            }
            if (spawnTimer) {
                spawnTimer.remove(false);
                spawnTimer = null;
            }
            if (timerBanana) {
                timerBanana.remove(false);
                timerBanana = null;
            }
            if (timerBudo) {
                timerBudo.remove(false);
                timerBudo = null;
            }
            if (timer035) {
                timer035.remove(false);
                timer035 = null;
            }

            rankingRequestId++;

            grounds.clear(true, true);
            enemies.clear(true, true);
            items.clear(true, true);
            coins.clear(true, true);

            clearGameOverUI();
            clearRankingTexts();

            if (rankingLoadingText) {
                rankingLoadingText.destroy();
                rankingLoadingText = null;
            }

            if (bgm && bgm.isPlaying) {
                bgm.stop();
            }

            this.physics.pause();

            player.setVisible(false);
            scoreText.setVisible(false);

            const titleBg = this.add.image(GAME_WIDTH / 2, GAME_HEIGHT / 2, 'title')
                .setDisplaySize(GAME_WIDTH, GAME_HEIGHT)
                .setDepth(3000);

            titleUI.push(titleBg);
        }

        function clearTitleUI() {
            titleUI.forEach(obj => {
                if (obj) obj.destroy();
            });
            titleUI = [];
        }

        function clearGameOverUI() {
            gameOverUI.forEach(obj => {
                if (obj) obj.destroy();
            });
            gameOverUI = [];
            resultScoreText = null;
            resultItemText = null;
        }

        function update() {
            if (gameMode !== 'playing' || isGameOver) return;

            const totalScore = score + bonusScore;
            let nextKey = currentBgKey;

            if (totalScore >= 30000) {
                nextKey = 'moon';
            } else {
                const cycle = Math.floor(totalScore / 5000) % 4;
                if (cycle === 1 || cycle === 3) nextKey = 'sunset';
                else if (cycle === 2) nextKey = 'night';
                else nextKey = 'daytime';
            }

            if (currentBgKey !== nextKey) {
                currentBgKey = nextKey;
                this.backGround.setTexture(nextKey);
            }

            this.backGround.tilePositionX += gameSpeed * 0.5;
            gameSpeed += 0.0005;

            const worldSpeed = -(gameSpeed * 60);

            setGroupVelocityAndCleanup(grounds, worldSpeed, -240);
            setGroupVelocityAndCleanup(enemies, worldSpeed, -150);
            setGroupVelocityAndCleanup(items, worldSpeed, -150);
            setGroupVelocityAndCleanup(coins, worldSpeed, -150);

            if (player.y > FALL_GAMEOVER_Y) {
                gameOver.call(this);
                return;
            }

            const body = player.body;

            const physicallyOnGround =
                body.blocked.down || body.touching.down;

            const groundedRecently =
                (this.time.now - lastGroundedTime) <= 80 &&
                body.velocity.y >= 0;

            const onGroundForAnimation = physicallyOnGround || groundedRecently;

            if (
                physicallyOnGround &&
                !wasOnGroundForLanding &&
                body.velocity.y >= 0 &&
                (this.time.now - lastJumpTime) > LAND_RESET_LOCK_MS
            ) {
                jumpCount = 0;
                lastGroundedTime = this.time.now;
                currentJumpAnimType = 'up';
                secondJumpAnimUntil = 0;
            }

            wasOnGroundForLanding = physicallyOnGround;

            if (onGroundForAnimation) {
                setPlayerState('run');
            } else {
                const secondJumpLocked =
                    currentJumpAnimType === 'second' &&
                    this.time.now < secondJumpAnimUntil;

                if (secondJumpLocked) {
                    setPlayerState('jump_2nd');
                } else if (body.velocity.y < -20) {
                    if (currentJumpAnimType === 'second') {
                        setPlayerState('jump_2nd');
                    } else {
                        setPlayerState('jump_up');
                    }
                } else {
                    setPlayerState('jump_down');
                }
            }

            scoreText.setText(
                `Score: ${formatScore(totalScore)}\n${scoreMultiplier > 1 ? '!! DOUBLE SCORE !!' : ''}`
            );
        }

        function setPlayerState(state) {
            if (!player || playerState === state) return;
            playerState = state;

            if (state === 'run') {
                player.play('run', true);
            } else if (state === 'jump_up') {
                player.play('jump_up', true);
            } else if (state === 'jump_2nd') {
                player.play('jump_2nd', true);
            } else if (state === 'jump_down') {
                player.play('jump_down', true);
            }
        }

        function setGroupVelocityAndCleanup(group, velocityX, destroyX) {
            group.getChildren().forEach(child => {
                if (!child.body) return;
                child.body.setVelocityX(velocityX);
                if (child.x < destroyX) {
                    child.destroy();
                }
            });
        }

        function scalePickupBody(sprite, bodyScale = 0.78) {
            sprite.setScale(DISPLAY_SCALE);
            sprite.body.setSize(
                sprite.width * bodyScale,
                sprite.height * bodyScale,
                true
            );
            return sprite;
        }

        function createGround(x, y) {
            const g = grounds.create(x, y, 'ground');
            g.setOrigin(0.5, 0.5);
            g.setScale(DISPLAY_SCALE);
            g.body.setAllowGravity(false);
            g.body.setImmovable(true);
            g.body.setVelocityX(-(gameSpeed * 60));

            g.body.setSize(
                GROUND_WIDTH * 0.80,
                GROUND_HEIGHT,
                true
            );

            g.body.checkCollision.down = false;
            g.body.checkCollision.left = false;
            g.body.checkCollision.right = false;
            return g;
        }

        function jump() {
            if (gameMode !== 'playing' || isGameOver) return;

            if (bgm && !bgm.isPlaying) {
                bgm.play();
            }

            if (jumpCount < maxJumps) {
                player.setVelocityY(-550);
                jumpCount++;
                wasOnGroundForLanding = false;
                lastJumpTime = this.time.now;

                if (jumpCount >= 2) {
                    currentJumpAnimType = 'second';
                    secondJumpAnimUntil = this.time.now + SECOND_JUMP_ANIM_LOCK_MS;
                    setPlayerState('jump_2nd');
                } else {
                    currentJumpAnimType = 'up';
                    secondJumpAnimUntil = 0;
                    setPlayerState('jump_up');
                }
            }
        }

        function spawnObstacle() {
            if (gameMode !== 'playing' || isGameOver) return;

            const x = GAME_WIDTH + DISPLAY_GROUND_WIDTH + 35;

            if (Math.random() > 0.17) {
                const nextY = Phaser.Math.Clamp(
                    lastGroundY + Phaser.Math.Between(-45, 40),
                    GROUND_Y_MIN,
                    GROUND_Y_MAX
                );
                createGround.call(this, x, nextY);
                lastGroundY = nextY;
            }

            const h = Phaser.Math.RND.pick([
                lastGroundY - 80,
                lastGroundY - 140,
                lastGroundY - 195
            ]);

            const st = Math.random();

            if (st < 0.14 && (x - lastEnemyX > 115)) {
                const enemy = enemies.create(x, h, 'bee');
                enemy.setScale(DISPLAY_SCALE);
                enemy.body.setAllowGravity(false);
                enemy.body.setVelocityX(-(gameSpeed * 60));
                enemy.body.setSize(enemy.width * 0.82, enemy.height * 0.82, true);
                lastEnemyX = x;
            } else if (st < 0.20) {
                const it = Math.random();
                let item;

                if (it < 0.2) item = items.create(x, h, 'banana').setName('banana');
                else if (it < 0.4) item = items.create(x, h, 'budo').setName('budo');
                else if (it < 0.6) item = items.create(x, h, '035').setName('035');
                else item = items.create(x, h, 'plant').setName('plant');

                scalePickupBody(item, 0.78);
                item.body.setAllowGravity(false);
                item.body.setVelocityX(-(gameSpeed * 60));
            } else if (st < 0.28) {
                const coin = coins.create(x, h, 'inmu_coin');
                scalePickupBody(coin, 0.78);
                coin.body.setAllowGravity(false);
                coin.body.setVelocityX(-(gameSpeed * 60));
            }

            lastEnemyX -= gameSpeed;
        }

        function collectItem(p, i) {
            const type = i.name;
            i.destroy();

            if (type === 'banana') {
                itemCounts.banana++;
                maxJumps = 3;

                if (timerBanana) timerBanana.remove(false);
                timerBanana = this.time.delayedCall(5000, () => {
                    maxJumps = 2;
                });

            } else if (type === 'budo') {
                itemCounts.budo++;
                scoreMultiplier = 2;
                p.setTint(0xff00ff);

                if (timerBudo) timerBudo.remove(false);
                timerBudo = this.time.delayedCall(5000, () => {
                    scoreMultiplier = 1;
                    p.clearTint();
                });

            } else if (type === '035') {
                itemCounts.cat035++;
                isInvincible = true;
                p.setAlpha(0.5);

                if (timer035) timer035.remove(false);
                timer035 = this.time.delayedCall(5000, () => {
                    isInvincible = false;
                    p.setAlpha(1);
                });

            } else if (type === 'plant') {
                itemCounts.hogo++;
                gameSpeed *= 0.975;
            }
        }

        function collectCoin(p, c) {
            c.destroy();
            itemCounts.shiro++;
            bonusScore += 500;
        }

        function hitEnemy(p, e) {
            if (isInvincible) {
                e.destroy();
            } else {
                gameOver.call(this);
            }
        }

        async function gameOver() {
            if (isGameOver || gameMode !== 'playing') return;
            isGameOver = true;
            gameMode = 'gameover';

            this.physics.pause();

            if (player) {
                player.setVelocity(0, 0);
                player.anims.stop();
            }

            if (scoreTimer) {
                scoreTimer.remove(false);
                scoreTimer = null;
            }
            if (spawnTimer) {
                spawnTimer.remove(false);
                spawnTimer = null;
            }
            if (timerBanana) {
                timerBanana.remove(false);
                timerBanana = null;
            }
            if (timerBudo) {
                timerBudo.remove(false);
                timerBudo = null;
            }
            if (timer035) {
                timer035.remove(false);
                timer035 = null;
            }

            if (bgm && bgm.isPlaying) bgm.stop();
            if (seGameOver) seGameOver.play();

            const finalScore = Math.floor(score + bonusScore);

            const resultBg = this.add.image(GAME_WIDTH / 2, GAME_HEIGHT / 2, 'result')
                .setDisplaySize(GAME_WIDTH, GAME_HEIGHT)
                .setDepth(2000);

            resultScoreText = this.add.text(225, 183, `TOTAL SCORE ${formatScore(finalScore)}`, {
                fontSize: '26px',
                fill: '#fff3c4',
                stroke: '#000000',
                strokeThickness: 5,
                fontStyle: 'bold'
            }).setOrigin(0.5).setDepth(2001);

            resultItemText = this.add.text(225, 229, `🍌x${itemCounts.banana}  🍇x${itemCounts.budo}  035x${itemCounts.cat035}  🌿x${itemCounts.hogo}  🪙x${itemCounts.shiro}`, {
                fontSize: '16px',
                fill: '#ffff00',
                stroke: '#000000',
                strokeThickness: 4
            }).setOrigin(0.5).setDepth(2001);

            rankingLoadingText = this.add.text(225, 285, 'ランキング読込中...', {
                fontSize: '16px',
                fill: '#ffffff',
                stroke: '#000000',
                strokeThickness: 4
            }).setOrigin(0.5).setDepth(2001);

            fetchRanking.call(this);

            const registerHit = this.add.rectangle(225, 515, 230, 42, 0xffffff, 0.001)
                .setInteractive()
                .setDepth(2002);

            registerHit.on('pointerdown', async () => {
                if (isSubmittingRanking || hasSubmittedRanking) return;
                await registerRanking.call(this, finalScore);
            });

            rankingRegisterButton = registerHit;

            const xShareHit = this.add.rectangle(225, 558, 220, 40, 0xffffff, 0.001)
                .setInteractive()
                .setDepth(2002);

            xShareHit.on('pointerdown', () => shareToX(finalScore));

            const titleHit = this.add.rectangle(225, 623, 220, 40, 0xffffff, 0.001)
                .setInteractive()
                .setDepth(2002);

            titleHit.on('pointerdown', () => showTitleScreen.call(this));

            gameOverUI.push(
                resultBg,
                resultScoreText,
                resultItemText,
                registerHit,
                xShareHit,
                titleHit
            );
        }

        async function fetchRanking() {
            const requestId = ++rankingRequestId;

            try {
                clearRankingTexts();

                const res = await fetch(`${RANKING_API_URL}?action=ranking`, {
                    method: 'GET'
                });

                const data = await res.json();

                if (!isGameOver || requestId !== rankingRequestId) return;

                if (rankingLoadingText) {
                    rankingLoadingText.destroy();
                    rankingLoadingText = null;
                }

                if (!data.ok) {
                    addRankingLine.call(this, 225, 280, 'ランキング取得失敗', '#ff8080');
                    return;
                }

                const ranking = Array.isArray(data.ranking) ? data.ranking.slice(0, 10) : [];

                if (ranking.length === 0) {
                    addRankingLine.call(this, 225, 280, 'まだランキングはありません', '#ffffff');
                    return;
                }

                ranking.forEach((item, i) => {
                    const safeName = String(item.name || 'Player').slice(0, 12);
                    const safeScore = Number(item.score || 0);
                    addRankingLine.call(
                        this,
                        225,
                        280 + (i * 20),
                        `${i + 1}. ${safeName} - ${formatScore(safeScore)}`,
                        '#ffffff',
                        15
                    );
                });

            } catch (err) {
                if (!isGameOver || requestId !== rankingRequestId) return;

                if (rankingLoadingText) {
                    rankingLoadingText.destroy();
                    rankingLoadingText = null;
                }
                clearRankingTexts();
                addRankingLine.call(this, 225, 280, 'ランキング通信エラー', '#ff8080');
                console.error('fetchRanking error:', err);
            }
        }

        async function registerRanking(fScore) {
            if (isSubmittingRanking || hasSubmittedRanking) return;

            const nameInput = prompt("ユーザーネームを入力してください", "Player");
            if (!nameInput) return;

            const name = String(nameInput).trim().slice(0, 20);
            if (!name) return;

            isSubmittingRanking = true;

            try {
                const params = new URLSearchParams({
                    action: 'submit',
                    name: name,
                    score: Math.floor(fScore),
                    banana: itemCounts.banana,
                    budo: itemCounts.budo,
                    cat035: itemCounts.cat035,
                    hogo: itemCounts.hogo,
                    shiro: itemCounts.shiro
                });

                const res = await fetch(`${RANKING_API_URL}?${params.toString()}`, {
                    method: 'GET'
                });

                const data = await res.json();

                if (data.ok) {
                    hasSubmittedRanking = true;

                    if (rankingRegisterButton) {
                        rankingRegisterButton.disableInteractive();
                    }

                    alert("ランキングに送信しました！");

                    rankingLoadingText = this.add.text(225, 280, 'ランキング更新中...', {
                        fontSize: '16px',
                        fill: '#ffffff',
                        stroke: '#000000',
                        strokeThickness: 4
                    }).setOrigin(0.5).setDepth(2001);

                    gameOverUI.push(rankingLoadingText);

                    await fetchRanking.call(this);
                } else {
                    alert("送信失敗: " + (data.error || "unknown error"));
                }
            } catch (err) {
                console.error('registerRanking error:', err);
                alert("通信エラー: " + err.message);
            } finally {
                isSubmittingRanking = false;
            }
        }

        function addRankingLine(x, y, text, color = '#fff', fontSize = 20) {
            if (!isGameOver) return;

            const t = this.add.text(x, y, text, {
                fontSize: `${fontSize}px`,
                fill: color,
                stroke: '#000000',
                strokeThickness: 4
            }).setOrigin(0.5).setDepth(2001);

            rankingTexts.push(t);
            gameOverUI.push(t);
        }

        function clearRankingTexts() {
            rankingTexts.forEach(text => {
                if (text) text.destroy();
            });
            rankingTexts = [];
        }

        function formatScore(value) {
            return `$${Math.floor(value).toLocaleString('en-US')}`;
        }

        function shareToX(fScore) {
            const totalScore = Math.floor(fScore);
            const itemsStr = `🍌x${itemCounts.banana} 🍇x${itemCounts.budo} 035x${itemCounts.cat035} 🌿x${itemCounts.hogo} 🪙x${itemCounts.shiro}`;

            const text = encodeURIComponent(
                `$INMU runで${formatScore(totalScore)}獲得しました！
Item ${itemsStr}

TOTAL Score ${formatScore(totalScore)}

ゲームプレイはこちらから
${SERVER_URL}

#InmuRun $INMU #035HP`
            );

            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
